<!DOCTYPE html>
<html>
<head>

<title>Personal Finance Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

<h2 class="text-center mb-4">Personal Finance Tracker</h2>

<div class="card p-4">

<h5>Add New Transaction</h5>

<div class="row g-2">

<div class="col-md-4">
<input type="text" id="name" class="form-control" placeholder="Transaction Name">
</div>

<div class="col-md-2">
<input type="number" id="amount" class="form-control" placeholder="Amount">
</div>

<div class="col-md-2">
<select id="type" class="form-control">
<option>Income</option>
<option>Expense</option>
</select>
</div>

<div class="col-md-2">
<input type="text" id="category" class="form-control" placeholder="Category">
</div>

<div class="col-md-2">
<input type="date" id="date" class="form-control">
</div>

<div class="col-12">
<input type="text" id="description" class="form-control" placeholder="Description">
</div>

<div class="col-12">
<button onclick="addTransaction()" class="btn btn-success mt-2">
Add Transaction
</button>
</div>

</div>

</div>

<div class="row text-center mt-4">

<div class="col-md-4">
<div class="card p-3">
<h6>Total Income</h6>
<h4 id="income">0</h4>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h6>Total Expenses</h6>
<h4 id="expense">0</h4>
</div>
</div>

<div class="col-md-4">
<div class="card p-3">
<h6>Net Balance</h6>
<h4 id="balance">0</h4>
</div>
</div>

</div>

<div class="card mt-4 p-3">

<h5>Transaction History</h5>

<table class="table table-bordered">

<thead>
<tr>
<th>Name</th>
<th>Amount</th>
<th>Type</th>
<th>Category</th>
<th>Date</th>
<th>Description</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="tableBody">

</tbody>

</table>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
